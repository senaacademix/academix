<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- Modern gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="50%" stop-color="#059669" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Background shape -->
  <circle cx="64" cy="64" r="60" fill="url(#grad1)" fill-opacity="0.05" stroke="url(#grad1)" stroke-width="2" stroke-dasharray="4 4" />

  <!-- Logo Icon: Stylized Graduation Cap and AcademiX Shield -->
  <!-- Main cap body -->
  <path d="M64 24 L108 46 L64 68 L20 46 Z" fill="url(#grad1)" />
  <path d="M108 46 L108 72 C108 74 106 76 104 76" stroke="url(#grad2)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Lower book / shield pages that form the structure -->
  <path d="M36 68 L36 90 C36 100 50 106 64 106 C78 106 92 100 92 90 L92 68" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  <path d="M64 68 L64 106" stroke="url(#grad2)" stroke-width="6" stroke-linecap="round" fill="none" />
  
  <!-- Dynamic accent arch representing growth/connection -->
  <path d="M16 64 C 16 100, 40 116, 64 116 C 88 116, 112 100, 112 64" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.4" />

  <!-- Small star in the center of the cap -->
  <path d="M64 41 L66 45 L70 45 L67 48 L68 52 L64 49 L60 52 L61 48 L58 45 L62 45 Z" fill="#ffffff" />
</svg>
